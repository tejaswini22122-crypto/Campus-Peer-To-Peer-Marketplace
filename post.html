<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Item</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Campus Peer-to-Peer Marketplace</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="browse.html">Browse</a>
    <a href="post.html">Post Item</a>
    <a href="login.html">Login</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <h2>Post an Item</h2>
    <h2>Sell Your Item</h2>
<p>Fill in the details below to list your item for other students.</p>

    <form>

        <label>Item Name</label><br>
        <input type="text" placeholder="Enter item name"><br><br>

        <label>Category</label><br>
        <select><option>Books</option>
                <option>Electronics</option>
                <option>Furniture</option>
                <option>Stationery</option>
                <option>Sports Equipment</option>
                <option>Clothing</option>
                <option>Bicycles</option>
                <option>Others</option>
                
        </select><br><br>

        <label>Price (₹)</label><br>
        <input type="number" placeholder="Enter price"><br><br>

        <label>Description</label><br>
        <textarea rows="5" placeholder="Describe your item"></textarea><br><br>

        <label>Upload Image</label><br>
        <input type="file"><br><br>

        <label>Contact Number</label><br>
        <input type="tel" placeholder="Enter phone number" required>
        <button type="submit">Post Item</button>
        <button type="reset">Clear Form</button>

    </form>

</div>
<script src="js/script.js"></script>
</body>
</html>
